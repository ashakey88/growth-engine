name: Pull integrations → R2 (raw)

# Stage 1: run the integrations and write one raw parquet per source to R2.
# Manual, or daily at 05:00 UTC (ahead of the transform job).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Ingest sources → raw parquet in R2
        env:
          STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python run_pipeline.py ingest
